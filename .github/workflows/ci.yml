name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: "51 3 * * 6" # Runs at 03:51, only on Saturday

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}-latest
    strategy:
      matrix:
        os: ["ubuntu", "macos", "windows"]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Docker
        if: matrix.os != 'windows'
        uses: docker/setup-buildx-action@v1

      - name: Build Docker image
        if: matrix.os != 'windows'
        run: |
          git clone https://github.com/DeepLcom/deepl-mock
          cd deepl-mock
          docker build -t deepl/deepl-mock .

      - name: Run DeepL API Mock Server
        if: matrix.os != 'windows'
        run: |
          docker run -d --rm --name deepl-mock -p 3000:3000 -p 3001:3001 deepl/deepl-mock

      - uses: crystal-lang/install-crystal@v1
        with:
          crystal: latest

      - name: Install dependencies
        run: shards install

      - name: Set environment variables
        if: matrix.os != 'windows'
        run: |
          echo "DEEPL_SERVER_URL=http://localhost:3000" >> $GITHUB_ENV
          echo "DEEPL_PROXY_URL=http://localhost:3001" >> $GITHUB_ENV

      - name: Run tests
        run: crystal spec

      - name: Stop DeepL API Mock Server
        if: matrix.os != 'windows'
        run: docker stop deepl-mock
